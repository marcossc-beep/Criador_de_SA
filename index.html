<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVALIAÇÃO PRÁTICA DE DESEMPENHO</title>
  <style>
    /* --- CONFIGURAÇÕES GERAIS --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      /* Mudança para Verdana: resolve o bug visual dos 'i' e 'l' grossos no PDF do Chrome */
      font-family: Verdana, Geneva, sans-serif; 
    }

    body {
      background-color: #f3f4f6;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* --- SIDEBAR FIXA --- */
    .sidebar-container {
      width: 320px;
      background-color: #121324;
      padding: 25px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar-container h2 {
      color: #a5b4fc;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .sidebar-container textarea {
      width: 100%;
      height: calc(100vh - 180px);
      background-color: #1e1f38;
      color: #a5b4fc;
      border: 1px solid #3730a3;
      border-radius: 6px;
      padding: 10px;
      font-family: monospace;
      resize: none;
      transition: border-color 0.2s;
    }

    .sidebar-container textarea.error-input {
      border-color: #ef4444 !important;
    }

    .btn-export {
      width: 100%;
      background-color: #059669;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: background 0.2s;
    }

    .btn-export:hover {
      background-color: #047857;
    }

    /* --- ÁREA DE PREVIEW --- */
    .preview-container {
      margin-left: 320px;
      flex: 1;
      padding: 40px;
      display: flex;
      justify-content: center;
      background-color: #f8fafc;
      min-height: 100vh;
    }

    .document-page {
      background: #ffffff;
      width: 210mm;
      min-height: 297mm;
      padding: 20mm;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    /* --- ESTILIZAÇÃO DO DOCUMENTO --- */
    .doc-header-table {
      border: 2px solid #000000;
      width: 100%;
      display: flex;
      flex-direction: column;
      margin-bottom: 25px;
    }

    .doc-row {
      display: flex;
      border-bottom: 2px solid #000000;
    }

    .doc-row:last-child {
      border-bottom: none;
    }

    .doc-cell {
      padding: 12px;
    }

    .title-cell {
      flex: 3;
      border-right: 2px solid #000000;
    }

    .title-cell h1 {
      font-size: 16px; /* Ajustado levemente para a Verdana */
      font-weight: 800;
      margin-bottom: 8px;
    }

    .title-cell p {
      font-size: 12px;
      margin-bottom: 3px;
    }

    .grade-cell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .grade-cell span {
      font-size: 11px;
      font-weight: bold;
    }

    .grade-cell .line-gap {
      width: 50px;
      border-bottom: 1px solid #000;
      margin-top: 15px;
    }

    .student-cell {
      flex: 3;
      border-right: 2px solid #000000;
      font-size: 12px;
    }

    .date-cell {
      flex: 1;
      font-size: 12px;
    }

    /* Conteúdo Dinâmico */
    .doc-content h2 {
      font-size: 13px;
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .doc-content p {
      font-size: 12px;
      line-height: 1.6;
      color: #1f2937;
      margin-bottom: 12px;
      font-weight: 400 !important;
    }

    /* --- CONFIGURAÇÃO DAS LISTAS (Removendo qualquer chance de bold falso) --- */
    .doc-content ul {
      margin-left: 25px;
      margin-bottom: 15px;
    }

    .doc-content li {
      font-size: 12px;
      line-height: 1.6;
      color: #1f2937;
      margin-bottom: 8px;
      font-weight: 400 !important; /* Força o peso normal da fonte */
    }

    /* Tabela do Cronograma */
    .cronograma-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .cronograma-table th, .cronograma-table td {
      border: 1px solid #000000;
      padding: 8px 12px;
      font-size: 11px;
      text-align: left;
    }

    .cronograma-table th {
      background-color: #f3f4f6;
      font-weight: bold;
    }

    /* --- REGRAS DE IMPRESSÃO --- */
    @media print {
      body {
        background-color: #ffffff;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      
      .sidebar-container {
        display: none !important;
      }

      .preview-container {
        margin-left: 0 !important;
        padding: 0 !important;
        background: none !important;
      }

      .document-page {
        width: 100% !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <aside class="sidebar-container">
      <h2>Editor JSON</h2>
      <textarea id="jsonInput">
{
  "unidadeCurricular": "Programação de Aplicativos",
  "curso": "Técnico em Desenvolvimento de Sistemas - SESI SENAI",
  "temaAvaliacao": "Sistema de Gerenciamento de Estoque e Rastreabilidade de Mercadorias",
  "mostrarAlunos": true,
  "contextualizacao": "Uma empresa no ramo de comércio de autopeças e ferramentas está enfrentando sérios problemas com o controle manual de suas mercadorias. A falta de um registro digitalizado faz com que itens frequentemente sumam das prateleiras sem justificativa, enquanto outros produtos obsoletos ficam armazenados por meses em excesso. Atualmente, o controle de entradas e saídas é feito em planilhas locais descentralizadas, o que impossibilita saber com precisão o fluxo de reabastecimento ou gerar relatórios confiáveis sobre o andamento das mercadorias. Para mitigar esses problemas e centralizar o fluxo operacional, a gerência solicitou o desenvolvimento de uma aplicação informatizada simplificada para automatizar o controle do estoque.",
  "desafio": "O desafio consiste em desenvolver a estrutura completa desse sistema de gerenciamento de estoque utilizando Fastify, PostgreSQL e React. O estudante deverá implementar a modelagem física do banco de dados, a lógica de endpoints do servidor (Back-End) e as telas de interação dinâmica (Front-End). É mandatório garantir a correta comunicação assíncrona entre a interface e o banco de dados. O escopo exige o desenvolvimento de um fluxo funcional onde novos produtos possam ser catalogados e alterados, movimentações de estoque sejam registradas por período e relatórios cruzados fiquem disponíveis para visualização clara na interface.",
  "regrasNegocio": [
    "Ambiente Back-End: Desenvolvimento utilizando o microframework Fastify integrado ao driver PostgreSQL (pacote pg) por meio de uma conexão em Pool.",
    "O Back-End deve conter validação de e-mail único no cadastro.",
    "O Front-End deve ocultar o botão de exclusão caso o perfil ativo não seja 'adm'."
  ],
  "cronograma": [
    { "entrega": "Modelagem de Banco (Script .SQL) com FK", "tempo": "25 min" },
    { "entrega": "Configuração do Servidor & CORS no Fastify", "tempo": "15 min" }
  ]
}
      </textarea>
      <button class="btn-export" onclick="window.print()">EXPORTAR PDF OFICIAL</button>
    </aside>

    <main class="preview-container">
      <div class="document-page" id="documentPage"></div>
    </main>

  </div>

  <script>
    function renderizarDocumento(dados) {
      const container = document.getElementById('documentPage');

      container.innerHTML = `
        <div class="doc-header-table">
          <div class="doc-row">
            <div class="doc-cell title-cell">
              <h1>AVALIAÇÃO PRÁTICA DE DESEMPENHO</h1>
              <p><strong>Unidade Curricular:</strong> ${dados.unidadeCurricular || ''}</p>
              <p><strong>Curso:</strong> ${dados.curso || ''}</p>
            </div>
            <div class="doc-cell grade-cell">
              <span>Nota:</span>
              <div class="line-gap"></div>
            </div>
          </div>

          ${dados.mostrarAlunos ? `
          <div class="doc-row">
            <div class="doc-cell student-cell">
              <strong>ESTUDANTE(S):</strong>
              <span>............................................................................................</span>
            </div>
            <div class="doc-cell date-cell">
              <strong>DATA:</strong>
              <span>___/___/2026</span>
            </div>
          </div>
          ` : ''}

          <div class="doc-row">
            <div class="doc-cell">
              <strong>TEMA DA AVALIAÇÃO:</strong>
              <p style="margin-top: 5px; font-weight: bold;">${dados.temaAvaliacao || ''}</p>
            </div>
          </div>
        </div>

        <div class="doc-content">
          <h2>1. Contextualização</h2>
          <p>${dados.contextualizacao || ''}</p>

          <h2>2. O Desafio Proposto</h2>
          <p>${dados.desafio || ''}</p>

          <h2>3. Regras de Negócio e Escopo Técnico</h2>
          <ul>
            ${(dados.regrasNegocio || []).map(regra => `<li>${regra}</li>`).join('')}
          </ul>

          <h2>4. Cronograma de Entregáveis Recomendados</h2>
          <table class="cronograma-table">
            <thead>
              <tr>
                <th>Mapeamento do Requisito Técnico / Entregável</th>
                <th style="width: 120px;">Tempo Estimado</th>
              </tr>
            </thead>
            <tbody>
              ${(dados.cronograma || []).map(item => `
                <tr>
                  <td>${item.entrega}</td>
                  <td>${item.tempo}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function carregarDados() {
      const jsonInput = document.getElementById('jsonInput');
      try {
        const rawJson = jsonInput.value;
        const dadosParseados = JSON.parse(rawJson);
        renderizarDocumento(dadosParseados);
        jsonInput.classList.remove('error-input');
      } catch (erro) {
        jsonInput.classList.add('error-input');
      }
    }

    document.getElementById('jsonInput').addEventListener('input', carregarDados);
    window.onload = carregarDados;
  </script>
</body>
</html>
