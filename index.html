<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criador de SA - SESI SENAI</title>
  <style>
    /* --- CONFIGURAÇÕES GERAIS --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f3f4f6;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* --- SIDEBAR FIXA (Não some e evita o fundo branco no scroll) --- */
    .sidebar-container {
      width: 320px;
      background-color: #121324;
      padding: 25px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar-container textarea {
      width: 100%;
      height: 250px;
      background-color: #1e1f38;
      color: #a5b4fc;
      border: 1px solid #3730a3;
      border-radius: 6px;
      padding: 10px;
      font-family: monospace;
      resize: none;
    }

    .btn-json {
      width: 100%;
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .btn-json:hover {
      background-color: #4338ca;
    }

    .btn-export {
      width: 100%;
      background-color: #059669;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: background 0.2s;
    }

    .btn-export:hover {
      background-color: #047857;
    }

    /* --- ÁREA DE PREVIEW (Ajustada para rolar ao lado da sidebar) --- */
    .preview-container {
      margin-left: 320px; /* Avança o espaço da sidebar fixa */
      flex: 1;
      padding: 40px;
      display: flex;
      justify-content: center;
      background-color: #f8fafc;
      min-height: 100vh;
    }

    /* Folha A4 simulada na tela */
    .document-page {
      background: #ffffff;
      width: 210mm;
      min-height: 297mm;
      padding: 20mm;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    /* --- ESTILIZAÇÃO DO DOCUMENTO (Visual Oficial) --- */
    .doc-header-table {
      border: 2px solid #000000;
      width: 100%;
      display: flex;
      flex-direction: column;
      margin-bottom: 25px;
    }

    .doc-row {
      display: flex;
      border-bottom: 2px solid #000000;
    }

    /* Remove a borda inferior do último elemento visível da tabela automaticamente */
    .doc-row:last-child {
      border-bottom: none;
    }

    .doc-cell {
      padding: 12px;
    }

    .title-cell {
      flex: 3;
      border-right: 2px solid #000000;
    }

    .title-cell h1 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .title-cell p {
      font-size: 13px;
      margin-bottom: 3px;
    }

    .grade-cell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .grade-cell span {
      font-size: 12px;
      font-weight: bold;
    }

    .grade-cell .line-gap {
      width: 50px;
      border-bottom: 1px solid #000;
      margin-top: 15px;
    }

    .student-cell {
      flex: 3;
      border-right: 2px solid #000000;
      font-size: 13px;
    }

    .date-cell {
      flex: 1;
      font-size: 13px;
    }

    .theme-row {
      font-size: 14px;
    }

    /* Conteúdo Dinâmico */
    .doc-content h2 {
      font-size: 14px;
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .doc-content p, .doc-content li {
      font-size: 13px;
      line-height: 1.5;
      color: #1f2937;
      margin-bottom: 10px;
    }

    .doc-content ul {
      margin-left: 20px;
      margin-bottom: 15px;
    }

    /* Tabela do Cronograma */
    .cronograma-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .cronograma-table th, .cronograma-table td {
      border: 1px solid #000000;
      padding: 8px 12px;
      font-size: 12px;
      text-align: left;
    }

    .cronograma-table th {
      background-color: #f3f4f6;
      font-weight: bold;
    }

    /* --- REGRAS DE IMPRESSÃO (Geração do PDF limpo) --- */
    @media print {
      body {
        background-color: #ffffff;
      }
      
      .sidebar-container {
        display: none !important;
      }

      .preview-container {
        margin-left: 0 !important;
        padding: 0 !important;
        background: none !important;
      }

      .document-page {
        width: 100% !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <aside class="sidebar-container">
      <textarea id="jsonInput">
{
  "unidadeCurricular": "Programação de Aplicativos",
  "curso": "Técnico em Desenvolvimento de Sistemas - SESI SENAI",
  "temaAvaliacao": "Sistema de Agendamento de Barbearia 'Corte & Estilo' (Integração Completa)",
  "mostrarAlunos": false,
  "contextualizacao": "A barbearia 'Corte & Estilo' está passando por um crescimento acelerado e precisa substituir o controle manual em caderno por um sistema digital integrado.",
  "desafio": "A equipe deve construir um ecossistema completo. O responsável pelo Back-end estruturará a tabela de clientes, enquanto o Front-end criará as interfaces.",
  "regrasNegocio": [
    "O Back-end deve conter validação de e-mail único no cadastro.",
    "É obrigatório criar um arquivo REST Client contendo todas as rotas.",
    "O Front-end deve ocultar o botão de exclusão caso o perfil ativo não seja 'adm'."
  ],
  "cronograma": [
    { "entrega": "Modelagem de Banco (Script .SQL) com FK", "tempo": "25 min" },
    { "entrega": "Configuração do Servidor & CORS no Fastify", "tempo": "15 min" },
    { "entrega": "Rota POST (Cadastro) com validação de duplicidade", "tempo": "30 min" }
  ]
}
      </textarea>
      <button class="btn-json" onclick="carregarDados()">Carregar Dados do JSON</button>
      <button class="btn-export" onclick="window.print()">EXPORTAR PDF OFICIAL</button>
    </aside>

    <main class="preview-container">
      <div class="document-page" id="documentPage">
        </div>
    </main>

  </div>

  <script>
    // Função que monta e renderiza o HTML na tela baseado no objeto JSON
    function renderizarDocumento(dados) {
      const container = document.getElementById('documentPage');

      // Monta a estrutura usando Template Strings de forma limpa
      container.innerHTML = `
        <div class="doc-header-table">
          
          <div class="doc-row">
            <div class="doc-cell title-cell">
              <h1>AVALIAÇÃO PRÁTICA DE DESEMPENHO</h1>
              <p><strong>Unidade Curricular:</strong> ${dados.unidadeCurricular || ''}</p>
              <p><strong>Curso:</strong> ${dados.curso || ''}</p>
            </div>
            <div class="doc-cell grade-cell">
              <span>Nota:</span>
              <div class="line-gap"></div>
            </div>
          </div>

          ${dados.mostrarAlunos ? `
          <div class="doc-row">
            <div class="doc-cell student-cell">
              <strong>ESTUDANTE(S):</strong>
              <span>............................................................................................</span>
            </div>
            <div class="doc-cell date-cell">
              <strong>DATA:</strong>
              <span>___/___/2026</span>
            </div>
          </div>
          ` : ''}

          <div class="doc-row">
            <div class="doc-cell">
              <strong>TEMA DA AVALIAÇÃO:</strong>
              <p style="margin-top: 5px; font-weight: bold;">${dados.temaAvaliacao || ''}</p>
            </div>
          </div>

        </div>

        <div class="doc-content">
          <h2>1. Contextualização</h2>
          <p>${dados.contextualizacao || ''}</p>

          <h2>2. O Desafio Proposto</h2>
          <p>${dados.desafio || ''}</p>

          <h2>3. Regras de Negócio e Escopo Técnico</h2>
          <ul>
            ${(dados.regrasNegocio || []).map(regra => `<li>${regra}</li>`).join('')}
          </ul>

          <h2>4. Cronograma de Entregáveis Recomendados</h2>
          <table class="cronograma-table">
            <thead>
              <tr>
                <th>Mapeamento do Requisito Técnico / Entregável</th>
                <th style="width: 120px;">Tempo Estimado</th>
              </tr>
            </thead>
            <tbody>
              ${(dados.cronograma || []).map(item => `
                <tr>
                  <td>${item.entrega}</td>
                  <td>${item.tempo}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    // Função para ler o valor da textarea e disparar a renderização
    function carregarDados() {
      try {
        const rawJson = document.getElementById('jsonInput').value;
        const dadosParseados = JSON.parse(rawJson);
        renderizarDocumento(dadosParseados);
      } catch (erro) {
        alert("Erro no formato do JSON. Verifique as vírgulas e aspas!");
      }
    }

    // Inicializa a página com o JSON padrão configurado na textarea
    window.onload = carregarDados;
  </script>
</body>
</html>
